{% extends "base.html" %}

{% block title %}Sign In — Dumb Smart Display{% endblock %}

{% block page %}
<div class="login-wrap">
  <div class="login-card">
    <h1>Dumb Smart Display</h1>
    <p class="subtitle">Enter your password to access the configuration UI.</p>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            autofocus
            required
            placeholder="Password"
          />
          <button type="button" class="pw-toggle" onclick="togglePw('password', this)">Show</button>
        </div>
      </div>
      <button type="submit" class="btn-primary">Sign in</button>
    </form>
  </div>
</div>

<script>
function togglePw(id, btn) {
  var inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'Hide'; }
  else { inp.type = 'password'; btn.textContent = 'Show'; }
}
</script>
{% endblock %}
